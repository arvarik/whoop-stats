info:
  contact: {}
  description: High-performance RESTful API for WHOOP data.
  title: WHOOP Stats API
  version: "1.0"
paths:
  /api/v1/cycles:
    get:
      consumes:
      - application/json
      description: Fetches cycles using cursor-based pagination
      parameters:
      - description: Cursor timestamp (RFC3339)
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_arvind_whoop-stats_internal_db.Cycle'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get cycles
      tags:
      - cycles
  /api/v1/insights:
    get:
      consumes:
      - application/json
      description: Fetches daily strain and recovery from continuous aggregates for
        the last 30 days
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get insights
      tags:
      - insights
  /api/v1/sleeps:
    get:
      consumes:
      - application/json
      description: Fetches sleeps using cursor-based pagination
      parameters:
      - description: Cursor timestamp (RFC3339)
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_arvind_whoop-stats_internal_db.Sleep'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get sleeps
      tags:
      - sleeps
  /api/v1/sync:
    post:
      consumes:
      - application/json
      description: Enqueues a sync job for the user
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Trigger ad-hoc sync
      tags:
      - sync
  /api/v1/user/profile:
    get:
      consumes:
      - application/json
      description: Fetches the user profile from the WHOOP API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get basic profile info
      tags:
      - user
  /api/v1/workouts:
    get:
      consumes:
      - application/json
      description: Fetches workouts using cursor-based pagination
      parameters:
      - description: Cursor timestamp (RFC3339)
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_arvind_whoop-stats_internal_db.Workout'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get workouts
      tags:
      - workouts
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
