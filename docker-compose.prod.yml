services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: whoop_stats
      POSTGRES_USER: ${POSTGRES_USER:-whoop_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpassword}
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    networks:
      - whoop_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whoop_user -d whoop_stats"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8082:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-whoop_user}:${POSTGRES_PASSWORD:-secretpassword}@timescaledb:5432/whoop_stats?sslmode=disable
      SERVER_PORT: "8080"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WHOOP_CLIENT_ID: ${WHOOP_CLIENT_ID}
      WHOOP_CLIENT_SECRET: ${WHOOP_CLIENT_SECRET}
      WHOOP_WEBHOOK_SECRET: ${WHOOP_WEBHOOK_SECRET}
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - whoop_network
    command: ["./whoop-stats", "-mode", "webhook"]

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3032:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
      WHOOP_STATS_TOKEN: ${WHOOP_STATS_TOKEN}
    depends_on:
      - backend
    networks:
      - whoop_network

networks:
  whoop_network:

volumes:
  timescaledb-data:
