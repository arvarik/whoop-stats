name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build -v ./cmd/... ./internal/...

      - name: Vet
        run: go vet ./cmd/... ./internal/...

      - name: Unit Tests
        run: |
          go test -race -count=1 ./internal/crypto/... ./internal/middleware/... ./internal/config/...
          go test -race -count=1 ./internal/storage/ -run TestParseTimezoneOffset
          go test -race -count=1 ./internal/poller/ -run TestPoller_Offpeak

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./web/package-lock.json"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
